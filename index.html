<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>動態切換展示</title>
</head>
<body>
    <div style="margin-bottom: 20px;">
        <button onclick="changePage('page1.html')">顯示網頁一</button>
        <button onclick="changePage('page2.html')">顯示網頁二</button>
        <button onclick="changePage('page3.html')">顯示網頁三</button>
    </div>

    <iframe id="displayFrame" src="page1.html" width="100%" height="600px" style="border: 1px solid #ccc;"></iframe>

    <script>
        // 理論邏輯：透過操控 DOM 節點的 src 屬性來抽換顯示內容
        function changePage(url) {
            document.getElementById('displayFrame').src = url;
        }
    </script>
</body>
</html>
