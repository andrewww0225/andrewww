    <style>

        }

<body>

<div class="main-container">
    <div class="header-section">
        <h1>工作項目01、04 測驗</h1>

    <div id="quiz-container"></div>

<script>
    // 匯入工作項目01、04題庫
    const allQuestions = [
        {q: "下列儲存記憶體中， 何者無法存入只能讀取？", opts: ["隨身碟", "RAM", "ROM", "磁帶"], a: "ROM"},
        {q: "在數據通訊( Data Communication) 系統中，線路兩端的電腦， 彼此可同時交互傳送及接受資料的型態稱為", opts: ["單工", "半雙工", "全雙工", "線上雙工"], a: "全雙工"},
        {q: "在布林運算中， 下列何者有誤？", opts: ["A+A' =1", "AA' =0", "A+A'B' =A+B'", "A(A' +B) =A'B"], a: "A(A' +B) =A'B"},
        {q: "如果電腦的位址匯流排(Address Bus) 有 17 條線， 則其儲存位置空間最多可達多少 Bytes？", opts: ["64K", "128K", "256 K", "512K"], a: "128K"},
        {q: "下列敘述何者有誤？", opts: ["一部電腦中， 有兩個以上 CPU 同時執行不同的程式，我們稱作是一種平行處理( Parallel Processing)", "掃描器(Scanner) 適用於影像處理應用( ImageProcessing)", "C 語言可以撰寫Recursive 程式，故適於大量資料處理應用", "CPU 中的控制單元乃負責各單元之間通道的建立"], a: "C 語言可以撰寫Recursive 程式，故適於大量資料處理應用"},
        {q: "電腦的五大單元中， 何者專門負責整體系統的指揮控制？", opts: ["輸入單元", "算術/ 邏輯單元", "記憶單元", "控制單元"], a: "控制單元"},
        {q: "下列記憶體中， 何者能讀取亦能寫入？", opts: ["PROM", "CD-ROM", "RAM", "EEROM"], a: "RAM"},
        {q: "下列敘述中，何者不是橋接器對電腦網路的貢獻？", opts: ["協助排除網路中的局部當機區域，使網路功能不停頓", "克服網路架構纜線距離的限制", "讓傳輸媒介或纜線可以混接", "提供多重路徑的協定"], a: "提供多重路徑的協定"},
        {q: "下列敘述何者錯誤？", opts: ["數據機( MODEM) 可以將類比信號轉成數位信號、或將數位號轉變成類比信號", "資料傳輸時，若線路兩端可以在同一時間互相傳送資料，此種方式稱為全雙工( Full Duplex)", "X. 25 是一個國際公認的分封交換( Packet Switching) 通訊標準", "經由數據機傳送至電話線上的信號為數位信號"], a: "經由數據機傳送至電話線上的信號為數位信號"},
        {q: "下列何者在網際網路( Internet) 上屬於單一性不可重複？", opts: ["Subnet Mask", "IP Address", "Default Gateway", "Password"], a: "IP Address"},
        {q: "下列關於「分封交換( Packet Switching)」的敘述中，何者錯誤？", opts: ["分封交換可彈性機動選擇資料傳送的路徑， 減少遲延的現象", "在不同的傳輸速率或通信協定下，均可相互轉換傳送", "通信使用時間較分散的用戶適於使用", "分封交換的每個封包的長度是可變動的"], a: "分封交換的每個封包的長度是可變動的"},
        {q: "下列有關「光纖」的敘述中， 何者錯誤？", opts: ["只適於傳送數位化的信號", "可使用的頻寬，比同軸電纜高出許多", "由玻璃纖維所組成， 不受電磁干擾", "傳輸速率高，體積細小"], a: "只適於傳送數位化的信號"},
        {q: "下列敘述中，何者錯誤？", opts: ["乙太網路( Ethernet) 採用匯流排網路結構及基頻(Baseband) 傳輸技術", "10BASE 5 和 10BASET 都採用 50 歐姆同軸電纜作為傳輸媒介", "10BASE 5 和 10BASET 的資料傳輸速率都是10Mbps", "在乙太網路中， 10BASE 2 的每段最長之長度為 200 公尺"], a: "10BASE 5 和 10BASET 都採用 50 歐姆同軸電纜作為傳輸媒介"},
        {q: "下列關於「環狀(Ring)網路」的敘述中， 何者錯誤？", opts: ["環狀網路中，每一個端點的電腦是透過 Repeater 連接到封閉式環狀網路上", "資料在傳輸媒介上傳遞時，是單向傳送", "Repeater 上分為聆聽、傳送與迂迴(Bypass)三種狀態", "環狀網路內由於傳輸距離較長，所以連接上網的端點站數也沒有限制"], a: "環狀網路內由於傳輸距離較長，所以連接上網的端點站數也沒有限制"},
        {q: "在排序的過程中，若由於資料量太大，而無法完全放在主記憶體中，必須借用輔助記憶體， 此種排序方式稱之為", opts: ["陣列排序( Sort of Array)", "內部排序( Internal Sorting)", "外部排序( External Sorting)", "快速排序(Quick Sorting)"], a: "外部排序( External Sorting)"},
        {q: "下列傳輸媒介中，何者在單位時間內的資料傳輸量最大？", opts: ["電話線", "同軸電纜", "光纖", "雙絞線"], a: "光纖"},
        {q: "下列關於「RS-232」的敘述中，何者不正確？", opts: ["為一種美國 ETA 規格", "可將電腦連接起來，以傳送資料", "屬於界面的硬體規格", "是並列式傳送"], a: "是並列式傳送"},
        {q: "在 CPU 中，下一個要被執行指令的位址是存放在", opts: ["位址暫存器", "緩衝暫存器", "指令暫存器", "程式計數器"], a: "程式計數器"},
        {q: "在「網路上的芳鄰」中，若要讓別人知道我的電腦名稱是「GOODMAN」，該在哪裡作設定？", opts: ["「控制台/ 網路」", "電腦名稱", "存取控制", "撥號網路"], a: "電腦名稱"},
        {q: "下列何者不是作業系統的主要功能？", opts: ["設備管理", "排序", "記憶體管理", "資源分配"], a: "排序"},
        {q: "下列儲存裝置中，何者存取速度最快？", opts: ["硬式磁碟機( Hard Disk)", "主記憶體( Main Memory)", "唯讀光碟機(CD-ROM)", "快取記憶體(Cache Memory)"], a: "快取記憶體(Cache Memory)"},
        {q: "下列有關「中斷( Interrupt)」的敘述中， 何者正確？", opts: ["中斷的要求必定來自硬體", "硬體中斷，相對於 CPU 正在執行的程式，乃是一非同步事件(Asynchronous Event)", "當 CPU 在執行中斷時， 就不能再執行其他的中斷", "可遮沒的中斷( Mask Interrupt) 沒有優先權"], a: "硬體中斷，相對於 CPU 正在執行的程式，乃是一非同步事件(Asynchronous Event)"},
        {q: "下列敘述何者正確？", opts: ["電腦的 CPU 其實只能執行機器語言", "所謂同步傳輸意指一次同時傳送兩個 Bytes 的資料", "即時系統(Real-time)一定是 On- line 系統， 而 On- line 系統也一定是 Real- time 系統", "指令暫存器是用來表示下一個等待執行指令的位址"], a: "電腦的 CPU 其實只能執行機器語言"},
        {q: "下列關於「行動裝置作業系統」的敘述， 何者不正確？", opts: ["i Phone 與 iPad 均使用 iOS 作業系統", "Android 是一種以 Linux 為基礎的開放原始碼作業系統", "Windows Phone 是微軟視⑤作業系統的行動裝置版本", "受限於硬體的能力，行動裝置作業系統一定是單工的作業系統"], a: "受限於硬體的能力，行動裝置作業系統一定是單工的作業系統"},
        {q: "(本題刪題)若收到一個副檔名為.class 的 Java Applet 程式，您該如何啟動它？", opts: ["直接可在 IE 執行", "需重新編譯方能執行", "需要連上 WWW伺服器方可執行", "要另存副檔名為.bat 的新檔案方可被執行"], a: "直接可在 IE 執行"},
        {q: "下列何者不是資料庫管理系統的目的？", opts: ["可保持資料的重複性", "可確保資料的安全性", "可保持資料的一致性", "可提升資料處理的效率"], a: "可保持資料的重複性"},
        {q: "採用存轉式( Store-and-Forward)傳輸資訊的方式是", opts: ["資料交換(Data Switching)", "電路交換(Circuit Switching)", "分封交換(Packet Switching)", "信號交換( Signal Switching)"], a: "分封交換(Packet Switching)"},
        {q: "編譯程式(Compiler) 可以檢查出程式的", opts: ["資料錯誤", "邏輯錯誤", "執行錯誤", "語法錯誤"], a: "語法錯誤"},
        {q: "下列關於多工( Multitasking) 作業系統的敘述中，何者錯誤？", opts: ["需要有中斷處理的能力", "需要有排程( Scheduling) 的能力", "需要有平行處理(Parallel Processing) 的能力", "可以用分時(Time Sharing) 處理技術達成"], a: "需要有平行處理(Parallel Processing) 的能力"},
        {q: "(本題刪題)下列哪一種工具無法讓您由 FTP 伺服器下傳檔案？", opts: ["Telnet客戶端", "FTP 客戶端", "Internet Explorer", "Outlook Express"], a: "Outlook Express"},
        {q: "所謂「流程圖(Flow Chart)」乃是指", opts: ["程式之輸出或輸入的一種表現方法", "以各種次常式來描述程式的一種方法", "以圖型化的演繹邏輯來表達程式操作順序的方法", "程式編譯後的結果"], a: "以圖型化的演繹邏輯來表達程式操作順序的方法"},
        {q: "電腦 CPU 內部的「定址模式(Addressing Mode)」是用來當作什麼功用的？", opts: ["指令解碼", "運算執行", "指令提取", "運算元提取"], a: "運算元提取"},
        {q: "下列何者不是控制單元的工作？", opts: ["運算執行", "時序控制", "指令提取", "指令解碼"], a: "運算執行"},
        {q: "下列關於「Microsoft SQL Server 2008 資料類型」的敘述，何者不正確？", opts: ["字元資料的長度如果可能大於 8000 位元組，則欄位不宜宣告成 char 資料類型", "如果欄位的字元資料長度差異很大，則欄位通常宣告成 char 資料類型， 而非 varchar 資料類型", "設計用來儲存日期的欄位可以宣告成 smalldatetime 資料類型", "宣告成 geography 資料類型的欄位所儲存的經緯度資料，可以應用 STDistance 方法來計算兩資料之間的最短距離"], a: "如果欄位的字元資料長度差異很大，則欄位通常宣告成 char 資料類型， 而非 varchar 資料類型"},
        {q: "在「關聯式(Relational) 資料庫」中，其擷取資料的方式為何？", opts: ["以資料的內容", "以資料的位址", "以資料的指標", "以資料的大小"], a: "以資料的內容"},
        {q: "當 CPU 從主記憶體中提取指令、解碼、決定 Operands 的位址、以及下一個指令的位址，這些動作是屬於", opts: ["程式週期", "記憶週期", "執行週期", "指令週期"], a: "指令週期"},
        {q: "在資料庫中，將資料的重複降低到最少的過程稱為", opts: ["結構化", "正規化", "模組化", "關聯化"], a: "正規化"},
        {q: "在作業系統中， 下列何者負責處理程式中斷？", opts: ["監督程式", "啟動載入程式", "輸出入控制程式", "工作控制程式"], a: "監督程式"},
        {q: "下列關於「結構化程式設計」的敘述中， 何者不正確？", opts: ["應盡量採用模組化設計", "應減少 GO TO 指令的使用", "入口要少、出口要多", "包含循序(Sequence)、選擇( Selection) 及重複(Repetition) 三種結構"], a: "入口要少、出口要多"},
        {q: "能使電腦執行比主記憶體還大的程式時， 可用以下哪一種技術？", opts: ["分時( Time Sharing)", "快取記憶(Cache Memory)", "虛擬記憶(Virtual Memory)", "多工作業( Multi-tasking)"], a: "虛擬記憶(Virtual Memory)"},
        {q: "下列有關「網際網路( Internet) 應用」之敘述中，何者錯誤？", opts: ["E- mail收件人的位址格式為 Lucky@server", "Internet 使用之通訊協定為TCP/IP", "HiNet 為中華電信公司所建立的網路系統", "目前各大專院校內常使用之網路系統為 Seed Net"], a: "目前各大專院校內常使用之網路系統為 Seed Net"},
        {q: "下列關於 Compiler 的敘述中，何者錯誤？", opts: ["可檢查程式邏輯錯誤", "可檢查程式語法( Syntax)錯誤", "可將程式原始碼變成目的碼", "無法產生執行檔"], a: "可檢查程式邏輯錯誤"},
        {q: "在磁碟容量的規格中，下列何者的容量最小？", opts: ["磁軌(Track)", "磁柱", "磁區", "叢集(Cluster)"], a: "磁區"},
        {q: "下列有關 WWW 之敘述中，何者錯誤？", opts: ["「全球資訊網」是 World Wide Web 之縮寫", "讓企業可以將自己的產品或服務項目等訊息提供給大眾知道", "為使網路資訊自由流通， 使用者在其上建立首頁(HomePage) 時，可以不受智慧財產保護相關法令約束", "WWW 上之資訊不僅可顯示文字、圖形，還可以顯示聲音、影像"], a: "為使網路資訊自由流通， 使用者在其上建立首頁(HomePage) 時，可以不受智慧財產保護相關法令約束"},
        {q: "在「OSI 通訊協定」中，提供檔案傳輸的是哪一層？", opts: ["應用層", "網路層", "實體層", "表達層"], a: "應用層"},
        {q: "在「OSI 通訊協定」中，提供電子郵遞服務的是哪一層？", opts: ["應用層", "網路層", "實體層", "表達層"], a: "應用層"},
        {q: "在「OSI 通訊協定」中，哪一層可安排資料傳輸路徑？", opts: ["應用層", "網路層", "實體層", "表達層"], a: "網路層"},
        {q: "「程式計數器(Program Counter)」是屬於以下哪一單元？", opts: ["控制單元", "輸出入單元", "算術邏輯單元", "記憶單元"], a: "控制單元"},
        {q: "「程式計數器(Program Counter)」的功能為何？", opts: ["記錄程式中執行完畢的指令", "記錄程式執行中的狀態", "記錄程式執行完成的時間", "記錄下一個指令的位址"], a: "記錄下一個指令的位址"},
        {q: "在資料庫管理系統中，用以定義資料型態、長度及關係的是", opts: ["工作控制語言(Job Control Language)", "資料控制語言(Data Control Language)", "資料定義語言(Data Definition Language)", "資料處理語言( Data Manipulation Language)"], a: "資料定義語言(Data Definition Language)"},
        {q: "在個人電腦中， 控制 CPU 和輸出入設備間信號傳輸的為何？", opts: ["Data Bus", "Cache", "BIOS", "Operating System"], a: "BIOS"},

    const QUIZ_SIZE = 100; 
    let currentQuiz = []; 

    const quizContainer = document.getElementById('quiz-container');
    const resultContainer = document.getElementById('result');

    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function initQuiz() {
        resultContainer.innerHTML = '';
        let shuffledQuestions = shuffleArray([...allQuestions]);
        // 隨機抽取 50 題，如果題庫少於 50 題就會全取
        currentQuiz = shuffledQuestions.slice(0, QUIZ_SIZE);
        renderQuiz();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderQuiz() {
        let html = '';
        currentQuiz.forEach((qObj, index) => {
            const isMultipleChoice = Array.isArray(qObj.a);
            const inputType = isMultipleChoice ? "checkbox" : "radio";
            const inputName = `q_${index}`;

            html += `
                <div class="question-block" id="block_${index}">
                    <div class="question-title">第 ${index + 1} 題：${qObj.q}</div>
                    <span class="type-tag">（${isMultipleChoice ? "複選題" : "單選題"}）</span>
                    <ul class="options">
            `;
            
            qObj.opts.forEach((opt, optIndex) => {
                const inputId = `q_${index}_opt_${optIndex}`;
                html += `
                    <li>
                        <input type="${inputType}" name="${inputName}" id="${inputId}" value="${opt}">
                        <label for="${inputId}">${opt}</label>
                    </li>
                `;
            });
            
            html += `</ul><div class="feedback" id="feedback_${index}"></div></div>`;
        });
        quizContainer.innerHTML = html;
    }

    function submitQuiz() {
        let score = 0;
        currentQuiz.forEach((qObj, index) => {
            const inputName = `q_${index}`;
            const selected = Array.from(document.querySelectorAll(`input[name="${inputName}"]:checked`)).map(el => el.value);
            let isCorrect = false;

            if (Array.isArray(qObj.a)) {
                isCorrect = selected.length === qObj.a.length && selected.every(v => qObj.a.includes(v));
            } else {
                isCorrect = selected.length === 1 && selected[0] === qObj.a;
            }

            const block = document.getElementById(`block_${index}`);
            const feedback = document.getElementById(`feedback_${index}`);
            
            if (isCorrect) {
                block.style.borderLeftColor = '#27ae60';
                block.style.backgroundColor = '#f0fff4';
                feedback.innerHTML = '<span class="correct-text">✓ 正確</span>';
                score++;
            } else {
                block.style.borderLeftColor = '#e74c3c';
                block.style.backgroundColor = '#fff5f5';
                const ans = Array.isArray(qObj.a) ? qObj.a.join('、') : qObj.a;
                feedback.innerHTML = `<span class="incorrect-text">✗ 錯誤。正確解答：${ans}</span>`;
            }
        });

        resultContainer.innerHTML = `測驗完成！總分：<span style="color: #3498db; font-size: 1.5em;">${score}</span> / ${currentQuiz.length}`;
        resultContainer.scrollIntoView({ behavior: 'smooth' });
    }

    initQuiz();
</script>
