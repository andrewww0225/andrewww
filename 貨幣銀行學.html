<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上測驗系統</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: auto;
            line-height: 1.6;
        }
        .question-block {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .question-title {
            font-weight: bold;
            margin-bottom: 10px;
        }
        .options {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        .options li {
            margin-bottom: 8px;
        }
        .options label {
            cursor: pointer;
            margin-left: 5px;
        }
        .submit-btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            margin-right: 10px;
        }
        .submit-btn:hover {
            background-color: #004494;
        }
        .restart-btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .restart-btn:hover {
            background-color: #218838;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .feedback {
            margin-top: 10px;
            font-weight: bold;
        }
        .correct-text { color: green; }
        .incorrect-text { color: red; }
    </style>
</head>
<body>

    <h1>測驗練習（隨機 50 題）</h1>
    <div id="quiz-container"></div>
    
    <div>
        <button class="submit-btn" onclick="submitQuiz()">交卷並計算成績</button>
        <button class="restart-btn" onclick="initQuiz()">重新抽題測驗</button>
    </div>
    
    <div id="result"></div>

    <script>
        // ==========================================
        // 請將產生的題庫陣列貼在下方的 allQuestions 中
        // ==========================================
        const allQuestions = [
            // 範例資料（貼上你的資料後可將此兩筆刪除）：
            {q: "下列放款何者屬於資產負債表外業務：", opts: ["透支", "通知放款", "聯合放款", "放款承諾"], a: "放款承諾"},
{q: "下列何者屬於銀行資產負債表的表外活動（off-balance-sheet activities）？", opts: ["保留盈餘", "房屋貸款", "存款", "信用狀"], a: "信用狀"},
  {q: "假定某家銀行有 1,600 億資產，股權資本 200 億，股權資本報酬率（ROE）24%，資產報酬率（ROA）為：", opts: ["3%", "0.375", "2.4%", "0.3%"], a: "3%"},
  {q: "根據臺灣的《金融控股公司法》，目前金融控股公司依照業務主體，可分為哪三類？", opts: ["銀行、基金、租賃", "保險、證券、不動產", "資產管理、銀行、基金", "銀行、保險、證券"], a: "銀行、保險、證券"},
{q: "銀行無法應付存款提領或放款需求增加所產生之資金需求，且無法迅速以合理成本取得資金，所造成損失的風險為下列何者？", opts: ["信用風險", "市場風險", "法律風險", "流動性風險"], a: "流動性風險"},
  {q: "銀行事先同意於某一特定期間，提供其客戶一定金額之內的貸款稱之為：", opts: ["保證準備（fiduciary reserves）", "銀行承兌匯票（bank acceptance）", "貸款承諾（loan commitments）", "信用分配（credit rationing）"], a: "貸款承諾（loan commitments）"},
  {q: "某銀行之利率敏感性負債比利率敏感性資產多出 5 億元，則當市場利率水準由 3% 上升至 8% 時，在其他情況不變下，將使該銀行：", opts: ["利潤增加 0.15 億元", "利潤增加 1.5 億元", "利潤減少 0.15 億元", "利潤減少 0.25 億元"], a: "利潤減少 0.25 億元"},
  {q: "在商業銀行的資產負債表中，何者不屬於資產項目？", opts: ["存款準備金", "次順位金融債券", "放款", "證券投資"], a: "次順位金融債券"},
  {q: "若小明在甲銀行將現金 50 萬元存入支票存款帳戶，且開立一張面額 100 萬元的支票給小華。當小華拿該支票去乙銀行將之兌現，請問這兩家銀行的資產負債表有何變化？", opts: ["甲銀行的資產增加 50 萬元", "乙銀行的資產增加 50 萬元", "甲銀行的準備金減少 50 萬元", "乙銀行的負債增加 50 萬元"], a: "甲銀行的準備金減少 50 萬元"},
{q: "設若某家銀行的資產分別為準備金 800 萬元、放款 5,000 萬元及證券投資 2,200 萬元，負債則有存款負債為 7,000 萬元，而其銀行資本為 1,000 萬元。若銀行適用的應提存款準備率是 10%，試問下列敘述何者正確？", opts: ["銀行現有準備金大於應提準備，且有超額準備為 100 萬元", "銀行現有準備金等於應提準備，因此超額準備為 0 元","銀行現有準備金低於應提準備，因此準備金不足金額為50萬元","銀行現有準備金大於應提準備，且有超額準備為30萬元"], a: "銀行現有準備金大於應提準備，且有超額準備為 100 萬元"},
{q: "在臺灣的本國銀行資產負債表中，下列哪一項資產的金額最大？", opts: ["對中央銀行債權", "對民間部門放款", "對非金融機構證券投資", "國外資產"], a: "對民間部門放款"},
  {q: "若有 A、B 和 C 三家銀行，在支票存款皆為 1,000 億元前提下，這三家銀行的準備金和放款：A 銀行：各為 100 億元和 900 億元；B 銀行：各為 120 億元和 880 億元；C 銀行：各為 110 億元和 890 億元。若法定準備率為 10%，哪家銀行獲利最高？又每家銀行皆發生存款被提領 15 億元，哪家銀行會發生流動性問題？", opts: ["C，C", "A，A", "A，A 和 C", "B，A、B 和 C"], a: "A，A 和 C"},
{q: "一個項目屬於商業銀行資產負債表中的資產？", opts: ["銀行向中央銀行借入款", "銀行吸收的外幣定期存單", "銀行持有之中央銀行可轉讓定期存單", "股東權益"], a: "銀行持有之中央銀行可轉讓定期存單"},
  {q: "下列何者不是銀行業為減輕放款過程中，衍生資訊不對稱問題的適當作法？", opts: ["補償性存款", "提高超額準備", "信用分配", "與顧客保持長期關係"], a: "提高超額準備"},
{q: "當銀行有利率敏感性負缺口時，下列敘述何者正確？", opts: ["利率下跌對銀行不利，應增加變動利率放款", "利率上升對銀行不利，應增加變動利率放款","利率下跌對銀行不利，應增加變動利率存款","利率上升對銀行不利，應增加變動利率存款"], a: "利率上升對銀行不利，應增加變動利率存款"},
{q: "除考慮信用風險外，計算資本適足率的加權風險性資產尚包括哪些風險？", opts: ["市場風險、作業風險", "利率風險、市場風險", "國家風險、作業風險", "經營風險、利率風險"], a: "市場風險、作業風險"},
  {q: "在評估銀行財務狀況的指標中，何者將可用於衡量資產品質？", opts: ["自有資本／風險性資產", "總收入／平均資產", "資產報酬率", "逾期放款／總放款"], a: "逾期放款／總放款"},
  {q: "評價銀行財務表現有所謂的 CAMELS 標準，何種指標可用於代表當中的「E」？", opts: ["流動比率", "資本適足率", "每股盈餘", "逾放比"], a: "每股盈餘"},
{q: "為了因應新版的巴塞爾資本協定，何種策略將可提高商業銀行的資本適足性？", opts: ["吸收大面額定期存款", "發行無擔保金融債券", "增加證券投資", "增加保留盈餘"], a: "增加保留盈餘"},
  {q: "評估銀行財務狀況的金融檢查常採用 CAMELS 分級標準，其中 S 是指：", opts: ["資產品質", "市場風險敏感性", "管理能力", "流動性"], a: "市場風險敏感性"},
  {q: "下列哪一種不是提升銀行自有資本比率的方法？", opts: ["增資", "增加高風險放款", "增加保留盈餘", "發行次順位債券"], a: "增加高風險放款"},
  {q: "根據巴塞爾協定（Basel III），2016年初，銀行須提撥「保護緩衝資本」（capital conservation buffer），在 2019 年，加計「保護緩衝資本比率」後，資本適足率的最低要求標準是：", opts: ["12.5%", "10.5%", "10%", "8%"], a: "10.5%"},
  {q: "我國目前金融監理之主要機關為：", opts: ["經濟部", "財政部", "中央銀行", "行政院金融監督管理委員會"], a: "行政院金融監督管理委員會"},
{q: "第三版巴塞爾資本協定（Basel III）的資本比率要求銀行依據下列何者持有資本？", opts: ["風險加權的資產值", "總資產值", "負債", "存款"], a: "風險加權的資產值"},
  {q: "根據第三版巴塞爾資本協定（Basel III），有關①第一類資本②第二類資本③資本保留緩衝等項目，何者可被納入自有資本規範？", opts: ["①、②和③", "僅①和②", "僅①", "僅②和③"], a: "①、②和③"},
{q: "金融機構存放比率愈高，代表其流動性愈：", opts: ["低", "持平", "高", "無法判斷"], a: "低"},
{q: "將無流動性的資產，轉變為市場上具流動性證券的過程，被稱為：", opts: ["套利", "國際化", "程序交易", "資產證券化"], a: "資產證券化"},
  {q: "下列何種金融機構將會協助企業發行與銷售證券，並積極參與購併、公司重整、財務諮詢？", opts: ["信託投資公司", "投資銀行", "融資公司", "商業銀行"], a: "投資銀行"},
        ];
        // ==========================================

        const QUIZ_SIZE = 50; // 設定每次抽取的題數
        let currentQuiz = []; // 存放當次被抽出的題目

        const quizContainer = document.getElementById('quiz-container');
        const resultContainer = document.getElementById('result');

        // Fisher-Yates 洗牌演算法
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // 初始化測驗：洗牌、抽題、渲染
        function initQuiz() {
            // 清空先前的結果
            resultContainer.innerHTML = '';
            
            // 複製一份原題庫陣列，避免修改到原始資料
            let shuffledQuestions = shuffleArray([...allQuestions]);
            
            // 擷取前 QUIZ_SIZE 題（若題庫總數少於 QUIZ_SIZE，則全取）
            currentQuiz = shuffledQuestions.slice(0, QUIZ_SIZE);

            renderQuiz();
            
            // 畫面捲動至最上方
            window.scrollTo(0, 0);
        }

        // 渲染題目介面
        function renderQuiz() {
            let html = '';
            currentQuiz.forEach((qObj, index) => {
                const isMultipleChoice = Array.isArray(qObj.a);
                const inputType = isMultipleChoice ? "checkbox" : "radio";
                const inputName = `q_${index}`;

                html += `<div class="question-block" id="block_${index}">`;
                html += `<div class="question-title">第 ${index + 1} 題：${qObj.q}</div>`;
                
                if (isMultipleChoice) {
                    html += `<div style="color: gray; font-size: 0.9em; margin-bottom: 10px;">（此為複選題，請勾選所有正確答案）</div>`;
                } else {
                    html += `<div style="color: gray; font-size: 0.9em; margin-bottom: 10px;">（此為單選題）</div>`;
                }

                html += `<ul class="options">`;
                qObj.opts.forEach((opt, optIndex) => {
                    const inputId = `q_${index}_opt_${optIndex}`;
                    html += `
                        <li>
                            <input type="${inputType}" name="${inputName}" id="${inputId}" value="${opt}">
                            <label for="${inputId}">${opt}</label>
                        </li>
                    `;
                });
                html += `</ul>`;
                html += `<div class="feedback" id="feedback_${index}"></div>`;
                html += `</div>`;
            });
            quizContainer.innerHTML = html;
        }

        // 批改邏輯
        function submitQuiz() {
            let score = 0;

            currentQuiz.forEach((qObj, index) => {
                const isMultipleChoice = Array.isArray(qObj.a);
                const inputName = `q_${index}`;
                
                const selectedElements = document.querySelectorAll(`input[name="${inputName}"]:checked`);
                const userAnswers = Array.from(selectedElements).map(el => el.value);
                
                let isCorrect = false;

                if (userAnswers.length > 0) {
                    if (isMultipleChoice) {
                        const correctAnswers = qObj.a;
                        if (userAnswers.length === correctAnswers.length) {
                            isCorrect = userAnswers.every(val => correctAnswers.includes(val));
                        }
                    } else {
                        isCorrect = (userAnswers[0] === qObj.a);
                    }
                }

                const block = document.getElementById(`block_${index}`);
                const feedback = document.getElementById(`feedback_${index}`);
                
                if (isCorrect) {
                    block.style.borderColor = 'green';
                    block.style.backgroundColor = '#f0fff0';
                    feedback.innerHTML = '<span class="correct-text">正確</span>';
                    score++;
                } else {
                    block.style.borderColor = 'red';
                    block.style.backgroundColor = '#fff0f0';
                    const correctAnsText = isMultipleChoice ? qObj.a.join('、') : qObj.a;
                    feedback.innerHTML = `<span class="incorrect-text">錯誤。正確解答為：${correctAnsText}</span>`;
                }
            });

            resultContainer.innerHTML = `測驗結束！您的總分為：<span style="color: #0056b3;">${score} / ${currentQuiz.length}</span>`;
            window.scrollTo(0, document.body.scrollHeight);
        }

        // 網頁首次載入時啟動
        initQuiz();
    </script>
</body>
</html>
